<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .grid-bg {
      background-image: linear-gradient(rgba(99,102,241,0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.08) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body class="bg-[#0a0a12] text-gray-200 min-h-screen flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 grid-bg opacity-30"></div>
  <div class="absolute top-1/4 -left-32 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

  <div class="text-center relative z-10 px-4">
    <h1 class="text-[10rem] sm:text-[14rem] font-extrabold leading-none bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent select-none">404</h1>
    <p class="text-xl sm:text-2xl font-semibold text-gray-300 -mt-4 mb-2">Halaman Tidak Ditemukan</p>
    <p class="text-gray-500 mb-8 max-w-md mx-auto">Sepertinya halaman yang kamu cari sudah dipindahkan, dihapus, atau tidak pernah ada.</p>
    <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-indigo-500/25 transition-all duration-300 hover:-translate-y-0.5">
      <i class="fas fa-home"></i> Kembali ke Beranda
    </a>
  </div>
</body>
</html>
