<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative blurs -->
  <circle cx="200" cy="150" r="200" fill="#6366f1" opacity="0.05"/>
  <circle cx="1000" cy="480" r="250" fill="#a78bfa" opacity="0.05"/>

  <!-- Accent line -->
  <rect x="100" y="230" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="100" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="#e2e8f0">Idris Efendi</text>

  <!-- Title -->
  <text x="100" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#818cf8" font-weight="600">Full Stack Developer &amp; Automation Engineer</text>

  <!-- Description -->
  <text x="100" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#94a3b8">Building efficient web applications, REST APIs, and AI-powered solutions.</text>

  <!-- Tech tags -->
  <rect x="100" y="430" width="90" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="145" y="453" font-family="monospace" font-size="14" fill="#818cf8" text-anchor="middle">Laravel</text>

  <rect x="210" y="430" width="80" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="250" y="453" font-family="monospace" font-size="14" fill="#818cf8" text-anchor="middle">Python</text>

  <rect x="310" y="430" width="110" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="365" y="453" font-family="monospace" font-size="14" fill="#818cf8" text-anchor="middle">JavaScript</text>

  <rect x="440" y="430" width="80" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="480" y="453" font-family="monospace" font-size="14" fill="#818cf8" text-anchor="middle">MySQL</text>

  <rect x="540" y="430" width="80" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="580" y="453" font-family="monospace" font-size="14" fill="#818cf8" text-anchor="middle">Docker</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="615" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#64748b">idrisefendi.github.io/cv</text>

  <!-- Profile circle -->
  <circle cx="1020" cy="260" r="100" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="1020" cy="260" r="80" fill="rgba(99,102,241,0.1)"/>
  <text x="1020" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="800" fill="#818cf8" text-anchor="middle" opacity="0.6">IE</text>
</svg>
